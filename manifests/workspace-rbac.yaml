apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mlflow-notes-agent-experiments-writer
  namespace: mlflow-demo
rules:
  - apiGroups: ["mlflow.kubeflow.org"]
    resources: ["experiments"]
    verbs:
      - get
      - list
      - create
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mlflow-notes-agent-experiments-writer
  namespace: mlflow-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mlflow-notes-agent-experiments-writer
subjects:
  - kind: ServiceAccount
    name: mlflow-notes-agent
    namespace: mlflow-demo-agent
